name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1 ~/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Debug PATH
        run: |
          echo "PATH: $PATH"
          echo "HOME: $HOME"
          which flutter || echo "flutter not found"
          ls ~/flutter/bin || echo "flutter bin not found"

      - name: Flutter version
        working-directory: stanag_app
        run: flutter --version

      - name: Restore Firebase options
        working-directory: stanag_app
        run: |
          echo ${{ secrets.FIREBASE_OPTIONS_DEV }} | base64 --decode > lib/firebase_options_dev.dart
          echo ${{ secrets.FIREBASE_OPTIONS_STAGING }} | base64 --decode > lib/firebase_options_staging.dart
          echo ${{ secrets.FIREBASE_OPTIONS_PROD }} | base64 --decode > lib/firebase_options_prod.dart

      - name: Install dependencies
        working-directory: stanag_app
        run: flutter pub get

      - name: Analyse
        working-directory: stanag_app
        run: flutter analyze

      - name: Run tests
        working-directory: stanag_app
        run: flutter test

      - name: Build APK (dev flavour)
        working-directory: stanag_app
        run: flutter build apk --flavor dev -t lib/main.dart --dart-define=FLAVOR=dev